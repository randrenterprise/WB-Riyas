name: WhatsApp Business Bot

on:
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm list --depth=0

      - name: Start WhatsApp Bot
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: node index.js
